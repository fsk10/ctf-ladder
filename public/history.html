<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Season History — CTF Ladder</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/playunreal.webp" type="image/webp">
</head>
<body>
<nav>
  <span class="brand"><img src="/playunreal.webp" style="height:2.2rem;vertical-align:middle;margin-right:.5rem;opacity:.9">CTF Ladder</span>
  <a href="/">Standings</a>
  <a href="/history" class="active">History</a>
  <span class="nav-right">
    <a href="#" onclick="openAbout();return false;">About</a>
    <a href="/admin">Admin</a>
  </span>
</nav>
<div class="content">
  <h1>Season History</h1>
  <div id="app"><p class="loading">Loading…</p></div>
</div>
<script>
const fmt = (n, d=2) => (typeof n === 'number' && isFinite(n)) ? n.toFixed(d) : '—';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtDate = s => s ? new Date(s).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' }) : null;
const dateRange = s => {
  const a = fmtDate(s.started_at), b = fmtDate(s.ended_at);
  if (a && b) return `${a} - ${b}`;
  if (a) return `From ${a}`;
  return null;
};

let allHistory        = [];
let currentHistSeason = null;
let activeHistTab     = 'final';
let currentStandings  = [];
let currentMinMatches = 0;
let viewMode  = localStorage.getItem('standingsView') === 'raw' ? 'raw' : 'points';
let sortState = { col: 'score', dir: -1 };

function applyViewClass() {
  document.body.classList.toggle('full-stats', viewMode === 'raw');
}
applyViewClass();

function sortedData(data) {
  if (!sortState.col) return data;
  return [...data].sort((a, b) => {
    const av = a[sortState.col], bv = b[sortState.col];
    if (typeof av === 'string') return sortState.dir * av.localeCompare(bv);
    return sortState.dir * ((av ?? -Infinity) - (bv ?? -Infinity));
  });
}

function sortBy(col) {
  if (sortState.col === col) sortState.dir *= -1;
  else { sortState.col = col; sortState.dir = col === 'display_name' ? 1 : -1; }
  const container = document.getElementById('standingsContainer');
  if (container) container.innerHTML = standingsTableHTML(currentStandings);
}

function setView(mode) {
  viewMode = mode;
  localStorage.setItem('standingsView', mode);
  applyViewClass();
  sortState = { col: 'score', dir: -1 };
  const toggle = document.getElementById('viewToggle');
  if (toggle) toggle.outerHTML = viewToggleHTML();
  const container = document.getElementById('standingsContainer');
  if (container) container.innerHTML = standingsTableHTML(currentStandings);
}

function th(label, col, leftAlign = false, tooltip = '') {
  const isActive = sortState.col === col;
  const arrow = isActive ? (sortState.dir === -1 ? ' ▼' : ' ▲') : '';
  const cls = leftAlign ? '' : ' class="num"';
  const titleAttr = tooltip ? ` title="${tooltip}"` : '';
  return `<th${cls}${titleAttr} onclick="sortBy('${col}')">${label}${arrow}</th>`;
}

function viewToggleHTML() {
  return `<div id="viewToggle" style="display:flex;gap:.4rem">
    <button class="btn btn-sm ${viewMode==='points'?'btn-primary':'btn-outline'}" onclick="setView('points')">Points</button>
    <button class="btn btn-sm ${viewMode==='raw'?'btn-primary':'btn-outline'}" onclick="setView('raw')">CTF Stats</button>
  </div>`;
}

function tableHeaders(scoreLabel = 'Final Score') {
  if (viewMode === 'points') {
    return `<th class="num">#</th>
      ${th('Player', 'display_name', true)}
      ${th('Pugs', 'total_pugs', false, 'Pugs played')}
      ${th('Total Pts', 'total_points', false, 'Total points earned')}
      ${th('Avg Pts/Pug', 'avg_points_per_pug', false, 'Average points per pug')}
      ${th('Part. Bonus', 'participation_bonus', false, 'Participation bonus (2.5 × √pugs)')}
      ${th(scoreLabel, 'score', false, 'Final score = (total pts / pugs) + participation bonus')}`;
  } else {
    return `<th class="num">#</th>
      ${th('Player', 'display_name', true)}
      ${th('Pugs', 'total_pugs', false, 'Pugs played')}
      ${th('W', 'wins', false, 'Wins')}
      ${th('W3', 'wins_by3', false, 'Wins by 3+ caps')}
      ${th('W5', 'wins_by5', false, 'Wins by 5+ caps')}
      ${th('D', 'draws', false, 'Draws')}
      ${th('L5', 'losses_by5', false, 'Losses by 5+ caps')}
      ${th('Cap', 'total_caps', false, 'Flag captures')}
      ${th('Ast', 'total_assists', false, 'Flag assists')}
      ${th('Cov', 'total_covers', false, 'Flag covers')}
      ${th('Kill', 'total_kills', false, 'Flag kills')}
      ${th('Ret', 'total_returns', false, 'Flag returns')}
      ${th('Seal', 'total_seals', false, 'Flag seals')}
      ${th('CS', 'clean_sheets', false, 'Clean sheets (opponent capped 0)')}`;
  }
}

function tableRow(p, rank, provisional = false, showMedals = false) {
  const cls = provisional ? ' class="provisional-row"' : '';
  const medalEmoji = showMedals && !provisional
    ? (rank === 1 ? '🏆' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '') : '';
  const medal = medalEmoji ? ` <span class="trophy">${medalEmoji}</span>` : '';
  const rankCell = provisional ? '—' : rank;
  const pugs = p.total_pugs ?? p.pugs_played;
  if (viewMode === 'points') {
    return `<tr${cls}>
      <td class="rank">${rankCell}</td>
      <td><a href="/player/${p.player_id}">${esc(p.display_name)}</a>${medal}</td>
      <td class="num">${pugs}</td>
      <td class="num">${fmt(p.total_points)}</td>
      <td class="num">${fmt(p.avg_points_per_pug)}</td>
      <td class="num">${fmt(p.participation_bonus)}</td>
      <td class="num"><strong>${fmt(p.score)}</strong></td>
    </tr>`;
  } else {
    return `<tr${cls}>
      <td class="rank">${rankCell}</td>
      <td><a href="/player/${p.player_id}">${esc(p.display_name)}</a>${medal}</td>
      <td class="num">${pugs}</td>
      <td class="num">${p.draws}</td>
      <td class="num">${p.wins}</td>
      <td class="num">${p.wins_by3}</td>
      <td class="num">${p.wins_by5}</td>
      <td class="num">${p.losses_by5}</td>
      <td class="num">${p.total_caps}</td>
      <td class="num">${p.total_assists}</td>
      <td class="num">${p.total_covers}</td>
      <td class="num">${p.total_kills}</td>
      <td class="num">${p.total_returns}</td>
      <td class="num">${p.total_seals}</td>
      <td class="num">${p.clean_sheets}</td>
    </tr>`;
  }
}

function provisionalDivider() {
  const colCount = viewMode === 'points' ? 7 : 15;
  return `<tr class="provisional-divider"><td colspan="${colCount}"></td></tr>`;
}

function standingsTableHTML(standings, scoreLabel = 'Final Score', minMatches = 0, showMedals = false) {
  if (!standings.length) return '<p class="text-muted">No data.</p>';
  const sorted = sortedData(standings);
  const threshold = Math.round(minMatches);
  if (threshold > 1) {
    const qualified   = sorted.filter(p => (p.total_pugs ?? p.pugs_played) >= threshold);
    const provisional = sorted.filter(p => (p.total_pugs ?? p.pugs_played) < threshold);
    const qualRows  = qualified.map((p, i) => tableRow(p, i + 1, false, showMedals)).join('');
    const provRows  = provisional.map(p => tableRow(p, '—', true, false)).join('');
    const divider   = provisional.length ? provisionalDivider() : '';
    return `<div class="table-wrap"><table>
      <thead><tr>${tableHeaders(scoreLabel)}</tr></thead>
      <tbody>${qualRows}${divider}${provRows}</tbody>
    </table></div>`;
  }
  const rows = sorted.map((p, i) => tableRow(p, i + 1, false, showMedals)).join('');
  return `<div class="table-wrap"><table>
    <thead><tr>${tableHeaders(scoreLabel)}</tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function matchesHTML(matches) {
  if (!matches || !matches.length) return '';
  const rows = matches.map(m => `
    <tr>
      <td>${m.match_date || '—'}</td>
      <td><a href="/match/${m.id}">${esc(m.map || 'Unknown map')}</a></td>
      <td>${esc(m.server || '—')}</td>
      <td class="num"><span class="team-red">${m.red_score}</span> : <span class="team-blue">${m.blue_score}</span></td>
    </tr>`).join('');
  return `<h3>Matches (${matches.length})</h3>
    <div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Map</th><th>Server</th><th class="num">Score</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function recapToggleHTML(id, label, color, text) {
  const extraClass = color === '#b07d2a' ? ' season-summary-card' : '';
  const paras = text.split(/\n\n+/).map(p => {
    const escaped = esc(p).replace(/\n/g, '<br>');
    return `<p>${escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</p>`;
  }).join('');
  return `<div style="margin-bottom:1rem">
    <div onclick="toggleHistoryRecap('${id}')" style="display:inline-flex;align-items:center;gap:.45rem;cursor:pointer;user-select:none;font-size:.88rem;font-weight:600;color:${color}">
      <span id="${id}-icon">▶</span> ${label}
    </div>
    <div id="${id}" style="display:none;margin-top:.6rem">
      <div class="week-summary-card${extraClass}"><div class="week-summary-body">${paras}</div></div>
    </div>
  </div>`;
}

function toggleHistoryRecap(id) {
  const body = document.getElementById(id);
  const icon = document.getElementById(id + '-icon');
  const expanded = body.style.display !== 'none';
  body.style.display = expanded ? 'none' : '';
  icon.textContent   = expanded ? '▶' : '▼';
}

// ===== Data loading =====

async function load() {
  allHistory = await (await fetch('/api/season-history')).json();

  if (!allHistory.length) {
    document.getElementById('app').innerHTML = '<p class="text-muted">No finished seasons yet.</p>';
    return;
  }

  const hashId = window.location.hash ? parseInt(window.location.hash.slice(1)) : null;
  const initial = (hashId && allHistory.find(s => s.id === hashId)) || allHistory[0];

  document.getElementById('app').innerHTML = `
    <div id="seasonBar"></div>
    <div id="seasonContent"></div>`;

  renderSelector(initial.id);
  await renderSeason(initial);
}

function renderSelector(selectedId) {
  const opts = allHistory.map(s =>
    `<option value="${s.id}" ${s.id === selectedId ? 'selected' : ''}>${esc(s.name)}</option>`
  ).join('');
  document.getElementById('seasonBar').innerHTML = `
    <div class="season-select-bar">
      <label>Season:</label>
      <select onchange="onSeasonChange(this.value)">${opts}</select>
    </div>`;
}

async function ensureSeasonData(season) {
  if (season._loaded) return;
  const [{ standings, min_matches }, { weeks }] = await Promise.all([
    (await fetch(`/api/standings?season_id=${season.id}`)).json(),
    (await fetch(`/api/season/${season.id}/weeks`)).json()
  ]);
  season._standings  = standings;
  season._minMatches = min_matches || 0;
  season._weeks      = weeks;
  season._weekData   = {};
  season._loaded     = true;
}

async function onSeasonChange(id) {
  window.location.hash = id;
  activeHistTab = 'final';
  const season = allHistory.find(s => s.id == id);
  await ensureSeasonData(season);
  currentHistSeason = season;
  renderSeasonContent(season);
}

async function renderSeason(season) {
  await ensureSeasonData(season);
  currentHistSeason = season;
  renderSeasonContent(season);
}

// ===== Tab rendering =====

function renderSeasonContent(season) {
  const weeks = [...(season._weeks || [])].reverse(); // newest first
  const tabsHTML = `<div class="tabs">
    <div class="tab${activeHistTab === 'final' ? ' active' : ''}" onclick="switchHistTab('final')">Final Standings</div>
    ${weeks.map(w => `<div class="tab${activeHistTab === 'week-'+w.id ? ' active' : ''}" onclick="switchHistTab('week-${w.id}')">Week ${w.week_number}</div>`).join('')}
  </div>`;

  document.getElementById('seasonContent').innerHTML = `
    ${tabsHTML}
    <div id="histTabContent"></div>`;

  renderHistTabContent(season);
}

function renderHistTabContent(season) {
  if (activeHistTab === 'final') {
    renderFinalTab(season);
  } else {
    const weekId = activeHistTab.replace('week-', '');
    const cached = season._weekData[weekId];
    if (cached) {
      renderWeekTab(cached);
    } else {
      document.getElementById('histTabContent').innerHTML = '<p class="loading">Loading…</p>';
      fetchWeekTab(weekId, season);
    }
  }
}

async function switchHistTab(tabId) {
  activeHistTab = tabId;
  sortState = { col: tabId === 'final' ? 'score' : 'score', dir: -1 };
  renderSeasonContent(currentHistSeason);
}

async function fetchWeekTab(weekId, season) {
  const { standings, matches, week } = await (await fetch(`/api/week/${weekId}`)).json();
  const normalized = standings.map(p => ({ ...p, total_pugs: p.pugs_played ?? p.total_pugs }));
  season._weekData[weekId] = { standings: normalized, matches, week };
  // Only render if this tab is still active
  if (activeHistTab === 'week-' + weekId) renderWeekTab(season._weekData[weekId]);
}

function renderFinalTab(season) {
  const standings = season._standings || [];
  currentStandings  = standings;
  currentMinMatches = season._minMatches || 0;

  const winner = standings[0], second = standings[1], third = standings[2];
  const range = dateRange(season);

  const winnerHTML = winner ? `
    <div class="winner-card">
      <div class="winner-trophy">🏆</div>
      <div class="winner-info">
        <div class="winner-label">Season Winner${range ? ` &nbsp;·&nbsp; <span style="font-weight:400;letter-spacing:0">${range}</span>` : ''}</div>
        <div class="winner-name"><a href="/player/${winner.player_id}">${esc(winner.display_name)}</a></div>
        <div class="winner-score">Final Score: <strong>${fmt(winner.score)}</strong> &nbsp;·&nbsp; ${winner.total_pugs} pugs &nbsp;·&nbsp; ${fmt(winner.total_points)} pts</div>
      </div>
    </div>` : '';

  const placeName = ['🥇 Winner', '🥈 Runner-up', '🥉 Third place'];
  const podiumCards = [winner, second, third].filter(Boolean).map((p, i) => `
    <div class="podium-card">
      <div class="place">${placeName[i]}</div>
      <div class="name"><a href="/player/${p.player_id}">${esc(p.display_name)}</a></div>
      <div class="score">${fmt(p.score)} &nbsp;·&nbsp; ${p.total_pugs} pugs</div>
    </div>`).join('');

  const recapHTML = season.ai_summary
    ? recapToggleHTML('hist-season-recap', 'Season Recap', '#b07d2a', season.ai_summary)
    : '';

  document.getElementById('histTabContent').innerHTML = `
    ${winnerHTML}
    ${standings.length > 1 ? `<div class="podium-row">${podiumCards}</div>` : ''}
    ${recapHTML}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
      <h2 style="margin:0">Final Standings</h2>
      ${viewToggleHTML()}
    </div>
    <div id="standingsContainer">${standingsTableHTML(standings, 'Final Score', currentMinMatches, true)}</div>`;
}

function renderWeekTab(weekData) {
  const standings = weekData.standings || [];
  currentStandings  = standings;
  currentMinMatches = 0;

  const recapHTML = weekData.week?.ai_summary
    ? recapToggleHTML(`hist-week-${weekData.week.id}`, `Week ${weekData.week.week_number} Recap`, '#0069c0', weekData.week.ai_summary)
    : '';

  document.getElementById('histTabContent').innerHTML = `
    ${recapHTML}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
      <h2 style="margin:0">Week ${weekData.week.week_number}</h2>
      ${viewToggleHTML()}
    </div>
    <div id="standingsContainer">${standingsTableHTML(standings, 'Weekly Score')}</div>
    ${matchesHTML(weekData.matches)}`;
}

load();
</script>
<script src="/js/about.js"></script>
</body>
</html>
