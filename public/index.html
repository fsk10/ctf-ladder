<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CTF Ladder</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/playunreal.webp" type="image/webp">
</head>
<body>
<nav>
  <span class="brand"><img src="/playunreal.webp" style="height:2.2rem;vertical-align:middle;margin-right:.5rem;opacity:.9">CTF Ladder</span>
  <a href="/" class="active">Standings</a>
  <a href="/history">History</a>
  <span class="nav-right">
    <a href="#" onclick="openAbout();return false;">About</a>
    <a href="/admin">Admin</a>
  </span>
</nav>

<div class="content">
  <div id="app"><p class="loading">Loading…</p></div>
</div>
<script>
const fmt = (n, d=2) => (typeof n === 'number' && isFinite(n)) ? n.toFixed(d) : '—';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtDatetime = iso => { if (!iso) return '—'; const d = new Date(iso), p = n => String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; };

let currentSeason    = null;
let currentWeeks     = [];
let activeTab        = 'standings';
let viewMode         = localStorage.getItem('standingsView') === 'raw' ? 'raw' : 'points';
let currentStandings = [];
let searchQuery      = '';
let sortState        = { col: 'score', dir: -1 };
let cachedWeekData   = {};
let currentMinMatches = 0;

function applyViewClass() {
  document.body.classList.toggle('full-stats', viewMode === 'raw');
}
applyViewClass();

function sortedData(data) {
  if (!sortState.col) return data;
  return [...data].sort((a, b) => {
    const av = a[sortState.col], bv = b[sortState.col];
    if (typeof av === 'string') return sortState.dir * av.localeCompare(bv);
    return sortState.dir * ((av ?? -Infinity) - (bv ?? -Infinity));
  });
}

function sortBy(col) {
  if (sortState.col === col) sortState.dir *= -1;
  else { sortState.col = col; sortState.dir = col === 'display_name' ? 1 : -1; }
  refreshContent();
}

function seasonSummaryHTML(season) {
  if (!season || !season.ai_summary) return '';
  const paras = season.ai_summary.split(/\n\n+/).map(p => {
    const escaped = esc(p).replace(/\n/g, '<br>');
    const bolded  = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    return `<p>${bolded}</p>`;
  }).join('');
  const open = recapIsExpanded('season-recap', true);
  return `<div style="margin-bottom:1rem">
    <div onclick="toggleRecap('season-recap')" style="display:inline-flex;align-items:center;gap:.45rem;cursor:pointer;user-select:none;font-size:.88rem;font-weight:600;color:#b07d2a">
      <span id="season-recap-icon">${open ? '▼' : '▶'}</span> Season Recap
    </div>
    <div id="season-recap" style="${open ? '' : 'display:none'}">
      <div class="week-summary-card season-summary-card" style="margin-top:.6rem">
        <div class="week-summary-body">${paras}</div>
      </div>
    </div>
  </div>`;
}

function weekSummaryHTML(weekData) {
  const s = weekData.week && weekData.week.ai_summary;
  if (!s) return '';
  const paras = s.split(/\n\n+/).map(p => {
    const escaped = esc(p).replace(/\n/g, '<br>');
    const bolded  = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    return `<p>${bolded}</p>`;
  }).join('');
  const id = `week-recap-${weekData.week.id}`;
  const open = recapIsExpanded(id, true);
  return `<div style="margin-bottom:1rem">
    <div onclick="toggleRecap('${id}')" style="display:inline-flex;align-items:center;gap:.45rem;cursor:pointer;user-select:none;font-size:.88rem;font-weight:600;color:#0069c0">
      <span id="${id}-icon">${open ? '▼' : '▶'}</span> Week ${esc(String(weekData.week.week_number))} Recap
    </div>
    <div id="${id}" style="${open ? '' : 'display:none'}">
      <div class="week-summary-card" style="margin-top:.6rem">
        <div class="week-summary-body">${paras}</div>
      </div>
    </div>
  </div>`;
}

function refreshContent() {
  const content = document.getElementById('tabContent');
  if (!content) return;
  const filtered = searchQuery
    ? currentStandings.filter(p => p.display_name.toLowerCase().includes(searchQuery.toLowerCase()))
    : currentStandings;
  const sorted = sortedData(filtered);
  const scoreLabel = activeTab === 'standings' ? 'Final Score' : 'Weekly Score';
  const minMatches = activeTab === 'standings' ? currentMinMatches : 0;
  let html = '';
  if (activeTab !== 'standings') {
    const weekId = activeTab.replace('week-', '');
    if (cachedWeekData[weekId]) html += weekSummaryHTML(cachedWeekData[weekId]);
  }
  html += searchBarHTML() + viewToggleHTML(minMatches) + tableBodyHTML(sorted, scoreLabel, minMatches);
  if (activeTab !== 'standings') {
    const weekId = activeTab.replace('week-', '');
    if (cachedWeekData[weekId]) html += matchesHTML(cachedWeekData[weekId].matches);
  }
  content.innerHTML = html;
}

async function load() {
  const { season, standings, min_matches } = await (await fetch('/api/standings')).json();

  if (!season) {
    document.getElementById('app').innerHTML = '<p class="text-muted">No active season yet.</p>';
    return;
  }

  const { weeks } = await (await fetch(`/api/season/${season.id}/weeks`)).json();
  currentSeason     = season;
  currentWeeks      = weeks;
  activeTab         = 'standings';
  currentStandings  = standings;
  currentMinMatches = min_matches || 0;
  renderPage();
}

function summaryDotWeekId() {
  const fiveDaysMs = 5 * 24 * 60 * 60 * 1000;
  const now = Date.now();
  // Find the most recently generated summary that is within 5 days
  const recent = currentWeeks
    .filter(w => w.ai_summary_generated_at)
    .filter(w => (now - new Date(w.ai_summary_generated_at + 'Z').getTime()) < fiveDaysMs)
    .sort((a, b) => new Date(b.ai_summary_generated_at) - new Date(a.ai_summary_generated_at));
  return recent.length ? recent[0].id : null;
}

function renderTabs() {
  const dotWeekId = summaryDotWeekId();
  const tabs = [
    { id: 'standings', label: 'Standings', dot: false },
    ...[...currentWeeks].reverse().map(w => ({ id: 'week-' + w.id, label: 'Week ' + w.week_number, dot: w.id === dotWeekId }))
  ];
  return `<div class="tabs">
    ${tabs.map(t => `<div class="tab${activeTab === t.id ? ' active' : ''}" onclick="switchTab('${t.id}')">${t.label}${t.dot ? '<span class="tab-summary-dot"></span>' : ''}</div>`).join('')}
  </div>`;
}

function viewToggleHTML(minMatches) {
  const notice = (activeTab === 'standings' && minMatches > 1)
    ? `<span style="font-size:.83rem;color:#666">Minimum <strong>${minMatches}</strong> pugs required for a ranked position. Players below this threshold are grayed out.</span>`
    : '';
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;gap:.4rem">
    ${notice}
    <div style="display:flex;gap:.4rem;margin-left:auto">
      <button class="btn btn-sm ${viewMode==='points'?'btn-primary':'btn-outline'}" onclick="setView('points')">Points</button>
      <button class="btn btn-sm ${viewMode==='raw'?'btn-primary':'btn-outline'}" onclick="setView('raw')">CTF Stats</button>
    </div>
  </div>`;
}

function setView(mode) {
  viewMode = mode;
  localStorage.setItem('standingsView', mode);
  applyViewClass();
  sortState = mode === 'points' ? { col: 'score', dir: -1 } : { col: 'total_caps', dir: -1 };
  refreshContent();
}

function th(label, col, leftAlign = false, tooltip = '') {
  const isActive = sortState.col === col;
  const arrow = isActive ? (sortState.dir === -1 ? ' ▼' : ' ▲') : '';
  const cls = leftAlign ? '' : ' class="num"';
  const titleAttr = tooltip ? ` title="${tooltip}"` : '';
  return `<th${cls}${titleAttr} onclick="sortBy('${col}')">${label}${arrow}</th>`;
}

function tableHeaders(scoreLabel) {
  if (viewMode === 'points') {
    return `<th class="num">#</th>
      ${th('Player', 'display_name', true)}
      ${th('Pugs', 'total_pugs', false, 'Pugs played')}
      ${th('Total Pts', 'total_points', false, 'Total points earned')}
      ${th('Avg Pts/Pug', 'avg_points_per_pug', false, 'Average points per pug')}
      ${th('Part. Bonus', 'participation_bonus', false, 'Participation bonus (2.5 × √pugs)')}
      ${th(scoreLabel, 'score', false, 'Final score = (total pts / pugs) + participation bonus')}`;
  } else {
    return `<th class="num">#</th>
      ${th('Player', 'display_name', true)}
      ${th('Pugs', 'total_pugs', false, 'Pugs played')}
      ${th('W', 'wins', false, 'Wins')}
      ${th('W3', 'wins_by3', false, 'Wins by 3+ caps')}
      ${th('W5', 'wins_by5', false, 'Wins by 5+ caps')}
      ${th('D', 'draws', false, 'Draws')}
      ${th('L5', 'losses_by5', false, 'Losses by 5+ caps')}
      ${th('Cap', 'total_caps', false, 'Flag captures')}
      ${th('Ast', 'total_assists', false, 'Flag assists')}
      ${th('Cov', 'total_covers', false, 'Flag covers')}
      ${th('Kill', 'total_kills', false, 'Flag kills')}
      ${th('Ret', 'total_returns', false, 'Flag returns')}
      ${th('Seal', 'total_seals', false, 'Flag seals')}
      ${th('CS', 'clean_sheets', false, 'Clean sheets (opponent capped 0)')}`;
  }
}

function rankArrow(p) {
  const d = p.rank_change;
  const pid = ` data-pid="${p.player_id}"`;
  if (d > 0) return `<span class="rank-arrow rank-up"${pid}>▲${d}</span>`;
  if (d < 0) return `<span class="rank-arrow rank-down"${pid}>▼${Math.abs(d)}</span>`;
  return `<span class="rank-arrow"${pid}></span>`;
}

function tableRow(p, rank, provisional = false) {
  const pugs = p.total_pugs ?? p.pugs_played;
  const cls = provisional ? ' class="provisional-row"' : '';
  const rankCell = provisional ? '—' : rank;
  const arrow = rankArrow(p);
  const rankTd = `<td class="rank">${rankCell}</td>`;
  if (viewMode === 'points') {
    return `<tr${cls}>
      ${rankTd}
      <td class="player-col">${arrow}<a href="/player/${p.player_id}">${esc(p.display_name)}</a>${trophyHTML(p)}</td>
      <td class="num">${pugs}</td>
      <td class="num">${fmt(p.total_points)}</td>
      <td class="num">${fmt(p.avg_points_per_pug)}</td>
      <td class="num">${fmt(p.participation_bonus)}</td>
      <td class="num"><strong>${fmt(p.score)}</strong></td>
    </tr>`;
  } else {
    return `<tr${cls}>
      ${rankTd}
      <td class="player-col">${arrow}<a href="/player/${p.player_id}">${esc(p.display_name)}</a>${trophyHTML(p)}</td>
      <td class="num">${pugs}</td>
      <td class="num">${p.draws}</td>
      <td class="num">${p.wins}</td>
      <td class="num">${p.wins_by3}</td>
      <td class="num">${p.wins_by5}</td>
      <td class="num">${p.losses_by5}</td>
      <td class="num">${p.total_caps}</td>
      <td class="num">${p.total_assists}</td>
      <td class="num">${p.total_covers}</td>
      <td class="num">${p.total_kills}</td>
      <td class="num">${p.total_returns}</td>
      <td class="num">${p.total_seals}</td>
      <td class="num">${p.clean_sheets}</td>
    </tr>`;
  }
}

function trophyHTML(p) {
  if (!p.season_wins || p.season_wins.length === 0) return '';
  const label = p.season_wins.length === 1
    ? `Winner of ${p.season_wins[0]}`
    : `Winner of ${p.season_wins.join(', ')}`;
  return ` <span class="trophy" title="${esc(label)}">🏆</span>`;
}

function searchBarHTML() {
  return `<div style="margin-bottom:.75rem">
    <input type="text" id="standingsSearch" placeholder="Search player…"
      style="max-width:220px;padding:.38rem .65rem;font-size:.88rem;border:1px solid #ccc;border-radius:4px"
      value="${esc(searchQuery)}" oninput="onSearch(this.value)">
  </div>`;
}

function onSearch(val) {
  searchQuery = val;
  refreshContent();
  const inp = document.getElementById('standingsSearch');
  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

function provisionalDivider(minMatches) {
  const colCount = viewMode === 'points' ? 7 : 15;
  return `<tr class="provisional-divider"><td colspan="${colCount}"></td></tr>`;
}

function tableBodyHTML(data, scoreLabel, minMatches = 0) {
  if (data.length === 0) return '<p class="text-muted">No players found.</p>';
  const threshold = Math.round(minMatches);
  if (threshold > 1) {
    const qualified   = data.filter(p => (p.total_pugs ?? p.pugs_played) >= threshold);
    const provisional = data.filter(p => (p.total_pugs ?? p.pugs_played) < threshold);
    const qualRows  = qualified.map((p, i) => tableRow(p, i + 1)).join('');
    const provRows  = provisional.map(p => tableRow(p, '—', true)).join('');
    const divider   = provisional.length ? provisionalDivider(threshold) : '';
    return `<div class="table-wrap"><table>
      <thead><tr>${tableHeaders(scoreLabel)}</tr></thead>
      <tbody>${qualRows}${divider}${provRows}</tbody>
    </table></div>`;
  }
  const rows = data.map((p, i) => tableRow(p, i + 1)).join('');
  return `<div class="table-wrap"><table>
    <thead><tr>${tableHeaders(scoreLabel)}</tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function matchesHTML(matches) {
  if (!matches || !matches.length) return '';
  const rows = matches.map(m => `
    <tr>
      <td>${fmtDatetime(m.match_date)}</td>
      <td><a href="/match/${m.id}">${esc(m.map || 'Unknown map')}</a></td>
      <td>${esc(m.server || '—')}</td>
      <td class="num"><span class="team-red">${m.red_score}</span> : <span class="team-blue">${m.blue_score}</span></td>
    </tr>`).join('');
  return `<h3>Matches (${matches.length})</h3>
    <div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Map</th><th>Server</th><th class="num">Score</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function renderPage() {
  const isFinished = currentSeason.status === 'finished';
  const badge = isFinished
    ? '<span class="badge badge-gray">Season Over</span>'
    : '<span class="badge badge-green">Active</span>';
  const recap = isFinished ? seasonSummaryHTML(currentSeason) : '';
  document.getElementById('app').innerHTML = `
    <h1>${esc(currentSeason.name)} ${badge}</h1>
    ${recap}
    <div id="tabs">${renderTabs()}</div>
    <div id="tabContent">${searchBarHTML() + viewToggleHTML(currentMinMatches) + tableBodyHTML(sortedData(currentStandings), 'Final Score', currentMinMatches)}</div>`;
}

async function switchTab(tabId) {
  activeTab = tabId;
  searchQuery = '';
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.textContent.trim() === tabLabel(tabId));
  });

  if (tabId === 'standings') {
    document.getElementById('tabContent').innerHTML = '<p class="loading">Loading…</p>';
    const { standings, min_matches } = await (await fetch('/api/standings')).json();
    currentStandings  = standings;
    currentMinMatches = min_matches || 0;
    refreshContent();
  } else {
    const weekId = tabId.replace('week-', '');
    document.getElementById('tabContent').innerHTML = '<p class="loading">Loading…</p>';
    const { standings, matches, week } = await (await fetch(`/api/week/${weekId}`)).json();
    // normalize pugs_played → total_pugs for consistent sort key
    const normalized = standings.map(p => ({ ...p, total_pugs: p.pugs_played ?? p.total_pugs }));
    cachedWeekData[weekId] = { standings: normalized, matches, week };
    currentStandings = normalized;
    refreshContent();
  }
}

function tabLabel(tabId) {
  if (tabId === 'standings') return 'Standings';
  const week = currentWeeks.find(w => w.id == tabId.replace('week-', ''));
  return week ? 'Week ' + week.week_number : '';
}

function toggleRecap(id) {
  const body = document.getElementById(id);
  const icon = document.getElementById(id + '-icon');
  const expanded = body.style.display !== 'none';
  body.style.display = expanded ? 'none' : '';
  icon.textContent   = expanded ? '▶' : '▼';
  localStorage.setItem('recap:' + id, expanded ? '0' : '1');
}

function recapIsExpanded(id, defaultExpanded = true) {
  const saved = localStorage.getItem('recap:' + id);
  return saved !== null ? saved === '1' : defaultExpanded;
}

function showRankTooltip(arrow, history) {
  const tip = document.getElementById('rank-tooltip');
  // newest week first
  const reversed = [...history].reverse();
  let rows = '';
  for (let i = 0; i < reversed.length; i++) {
    const h = reversed[i];
    // change compared to previous week (next in reversed array = one week earlier)
    let change = '';
    if (i < reversed.length - 1) {
      const diff = reversed[i + 1].rank - h.rank;
      if (diff > 0)      change = `<span class="rank-up">▲${diff}</span>`;
      else if (diff < 0) change = `<span class="rank-down">▼${Math.abs(diff)}</span>`;
      else               change = `<span class="rank-same">—</span>`;
    }
    rows += `<tr><td>Week ${h.week}</td><td>#${h.rank}</td><td>${change}</td></tr>`;
  }
  tip.innerHTML = `<table>${rows}</table>`;
  const rect = arrow.getBoundingClientRect();
  const tipW = 110;
  const left = (rect.right + window.scrollX + 8) + tipW > window.innerWidth
    ? rect.left + window.scrollX - tipW - 8
    : rect.right + window.scrollX + 8;
  tip.style.left = left + 'px';
  tip.style.top  = (rect.top + window.scrollY - 4) + 'px';
  tip.classList.add('visible');
}

function hideRankTooltip() {
  document.getElementById('rank-tooltip').classList.remove('visible');
}

document.addEventListener('mouseover', e => {
  const arrow = e.target.closest('.rank-arrow[data-pid]');
  if (!arrow) { hideRankTooltip(); return; }
  const pid = +arrow.dataset.pid;
  const player = currentStandings.find(p => p.player_id === pid);
  if (!player || !player.rank_history || player.rank_history.length < 2) return;
  showRankTooltip(arrow, player.rank_history);
});

document.addEventListener('mouseout', e => {
  const arrow = e.target.closest('.rank-arrow[data-pid]');
  if (arrow && !arrow.contains(e.relatedTarget)) hideRankTooltip();
});

load();

</script>
<div id="rank-tooltip" class="rank-tooltip"></div>
<script src="/js/about.js"></script>
</body>
</html>
