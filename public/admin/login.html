<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — Sunday Ladder</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-wrap {
      max-width: 380px;
      margin: 5rem auto;
      padding: 0 1.5rem;
    }
    .login-wrap h1 { text-align: center; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
<div class="login-wrap">
  <h1>Sunday Ladder<br><span style="font-size:1rem;color:#888;font-weight:400">Admin Login</span></h1>
  <div class="card">
    <div id="err"></div>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
  </div>
  <p style="text-align:center;margin-top:1rem"><a href="/">← Public site</a></p>
</div>
<script>
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = '/admin/dashboard';
  } else {
    document.getElementById('err').innerHTML = '<div class="alert alert-error">Invalid credentials.</div>';
  }
}
</script>
</body>
</html>
