<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — CTF Ladder</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/playunreal.webp" type="image/webp">
</head>
<body>
<div class="login-wrap">
  <h1>CTF Ladder<br><span style="font-size:1rem;color:#888;font-weight:400">Admin Login</span></h1>
  <div class="card">
    <div id="err"></div>
    <form id="loginForm" onsubmit="login(); return false;" autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password">
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem">
        <input type="checkbox" id="remember" name="remember" style="width:auto;margin:0">
        <label for="remember" style="margin:0;font-weight:400;cursor:pointer">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
    </form>
  </div>
  <p style="text-align:center;margin-top:1rem"><a href="/">← Public site</a></p>
</div>
<script>
async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;
  const res = await fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password, remember })
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = '/admin/dashboard';
  } else {
    document.getElementById('err').innerHTML = '<div class="alert alert-error">Invalid credentials.</div>';
  }
}
</script>
</body>
</html>
