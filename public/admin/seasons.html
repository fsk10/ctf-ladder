<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seasons — Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/playunreal.webp" type="image/webp">
</head>
<body>
<nav>
  <span class="brand"><img src="/playunreal.webp" style="height:2.2rem;vertical-align:middle;margin-right:.5rem;opacity:.9">CTF Ladder</span>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/seasons">Seasons</a>
  <a href="/admin/weeks">Weeks</a>
  <a href="/admin/players">Players</a>
  <a href="/admin/import">Import</a>
  <a href="/admin/settings">Settings</a>
  <a href="/admin/notes">Notes</a>
  <a href="/admin/security">Security</a>
  <span class="nav-right">
    <a href="/">Public</a>
    <a href="#" onclick="logout()">Logout</a>
  </span>
</nav>
<div class="content">
  <h1>Seasons</h1>

  <div class="card mb-2">
    <h3>Create New Season</h3>
    <div id="createMsg"></div>
    <div class="form-row mt-1">
      <div class="form-group">
        <label for="newName">Season name</label>
        <input type="text" id="newName" placeholder="e.g. Season 1">
      </div>
      <div class="form-group" style="flex:0">
        <label>&nbsp;</label>
        <button class="btn btn-success" onclick="createSeason()">Create</button>
      </div>
    </div>
  </div>

  <div id="list"><p class="loading">Loading…</p></div>
</div>
<script src="/admin/common.js"></script>
<script>
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function loadList() {
  const seasons = await (await fetch('/api/admin/seasons')).json();
  const rows = seasons.map(s => {
    const isActive   = s.status === 'active';
    const isFinished = s.status === 'finished' && !s.archived;
    const isArchived = s.status === 'finished' && s.archived;
    const badge = isActive
      ? '<span class="badge badge-green">Active</span>'
      : isFinished
        ? '<span class="badge" style="background:#b07d2a;color:#fff">Finished</span>'
        : '<span class="badge badge-gray">Archived</span>';
    const hasSummary = !!s.ai_summary;
    return `
    <tr>
      <td>${esc(s.name)}</td>
      <td>${badge}${hasSummary ? ' <span class="badge badge-green" style="font-size:.7rem">AI</span>' : ''}</td>
      <td class="num">${s.week_count}</td>
      <td class="num">${s.match_count}</td>
      <td>${s.created_at.split('T')[0]}</td>
      <td style="white-space:nowrap">
        ${isActive ? `<button class="btn btn-danger btn-sm" onclick="finishSeason(${s.id})">Finish Season</button>` : ''}
        ${isFinished ? `
          <button class="btn btn-outline btn-sm" title="Generate AI Recap" onclick="toggleSeasonAiRow(${s.id})">AI Recap</button>
          <button class="btn btn-primary btn-sm" onclick="archiveSeason(${s.id})">Archive</button>
        ` : ''}
        ${isArchived ? `<button class="btn btn-outline btn-sm" onclick="unarchiveSeason(${s.id})">Unarchive</button>` : ''}
        ${!isActive && !isArchived ? `<button class="btn btn-outline btn-sm" onclick="reactivateSeason(${s.id})">Re-activate</button>` : ''}
        <button class="btn btn-danger btn-sm" onclick="deleteSeason(${s.id}, '${s.name.replace(/'/g, "\\'")}')">Delete</button>
      </td>
    </tr>
    <tr id="season-ai-${s.id}" style="display:none;background:#f0f4f0">
      <td colspan="6" style="padding:.75rem 1rem">
        <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
          <label style="font-weight:600;font-size:.88rem">Style:</label>
          <select id="season-style-${s.id}" style="padding:.38rem .6rem;font-size:.88rem;border:1px solid #ccc;border-radius:4px;background:#fff">
            <option value="serious">Serious</option>
            <option value="hype">Hype</option>
            <option value="funny">Funny</option>
            <option value="epic">Epic</option>
          </select>
          <button id="season-gen-btn-${s.id}" class="btn btn-success btn-sm" onclick="generateSeasonSummary(${s.id})">${hasSummary ? 'Regenerate' : 'Generate'}</button>
          ${hasSummary ? `<button class="btn btn-danger btn-sm" onclick="deleteSeasonSummary(${s.id})">Delete recap</button>` : ''}
          <button class="btn btn-secondary btn-sm" onclick="toggleSeasonAiRow(${s.id})">Cancel</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('list').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Status</th><th class="num">Weeks</th><th class="num">Matches</th><th>Created</th><th></th></tr></thead>
        <tbody>${rows || '<tr><td colspan="6" class="text-muted">No seasons yet.</td></tr>'}</tbody>
      </table>
    </div>`;
}

async function createSeason() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return;
  const res = await fetch('/api/admin/seasons', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  const data = await res.json();
  if (res.ok) {
    document.getElementById('newName').value = '';
    document.getElementById('createMsg').innerHTML = '<div class="alert alert-success">Season created.</div>';
    loadList();
  } else {
    document.getElementById('createMsg').innerHTML = `<div class="alert alert-error">${data.error}</div>`;
  }
}

async function finishSeason(id) {
  if (!confirm('Mark this season as finished? It will remain visible on the standings page until you move it to history.')) return;
  const res = await fetch(`/api/admin/seasons/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: 'finished' })
  });
  if (res.ok) loadList();
}

async function archiveSeason(id) {
  if (!confirm('Archive this season? It will move to the history page and no longer appear on standings.')) return;
  const res = await fetch(`/api/admin/seasons/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ archived: true })
  });
  if (res.ok) loadList();
}

async function unarchiveSeason(id) {
  if (!confirm('Unarchive this season? It will reappear on the standings page as "Season Over".')) return;
  const res = await fetch(`/api/admin/seasons/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ archived: false })
  });
  if (res.ok) loadList();
}

async function reactivateSeason(id) {
  if (!confirm('Re-activate this season? Any currently active season will be marked as finished.')) return;
  const res = await fetch(`/api/admin/seasons/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: 'active' })
  });
  if (res.ok) loadList();
}

async function deleteSeason(id, name) {
  if (!confirm(`Delete "${name}" and ALL its weeks, matches and stats?\n\nThis cannot be undone.`)) return;
  const res = await fetch(`/api/admin/seasons/${id}`, { method: 'DELETE' });
  if (res.ok) loadList();
}

function toggleSeasonAiRow(id) {
  const row = document.getElementById(`season-ai-${id}`);
  row.style.display = row.style.display === 'none' ? '' : 'none';
}

async function generateSeasonSummary(id) {
  const btn   = document.getElementById(`season-gen-btn-${id}`);
  const style = document.getElementById(`season-style-${id}`)?.value || 'serious';
  btn.disabled = true;
  btn.textContent = 'Generating…';
  const res = await fetch(`/api/admin/seasons/${id}/summary`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ style })
  });
  if (res.ok) { loadList(); }
  else {
    const d = await res.json();
    alert('Error: ' + d.error);
    btn.disabled = false;
    btn.textContent = 'Generate';
  }
}

async function deleteSeasonSummary(id) {
  if (!confirm('Delete AI recap for this season?')) return;
  const res = await fetch(`/api/admin/seasons/${id}/summary`, { method: 'DELETE' });
  if (res.ok) loadList();
}

checkAuth().then(loadList);
</script>
</body>
</html>
